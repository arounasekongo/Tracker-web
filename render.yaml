services:
  - type: web
    name: wave-verification
    env: node
    buildCommand: npm ci
    startCommand: npm run init-db && npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wave-db
          property: connectionString
      - key: DB_HOST
        fromDatabase:
          name: wave-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wave-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: wave-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: wave-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: wave-db
          property: password
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: PHOTO_STORAGE
        value: database
      - key: DATABASE_FALLBACK
        value: disabled
      - key: DATA_RETENTION_DAYS
        value: "90"
      - key: AUTO_VERIFICATION_ON_LOAD
        value: "true"
      - key: TRUST_PROXY
        value: "1"

databases:
  - name: wave-db
    databaseName: wave_verification
    user: wave_admin

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-wave_verification}
      POSTGRES_USER: ${DB_USER:-wave_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - wave_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 15

volumes:
  wave_postgres_data:
